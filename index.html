<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omikuji Info</title>

    <meta name="description" content="Discordのお知らせをWebから簡単に送信できるBot">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<header>

    <div class="logo-area">

        <img src="images/logo.png" class="logo">

        <h1>Omikuji Info</h1>

    </div>

</header>

<section class="hero">

    <h2>
        おみくじボットのお知らせ用Bot<br>
        導入サイト
    </h2>

    <p>
        以下のボタンより<br>
        自鯖にお知らせボットを導入できます
    </p>

    <a class="invite-btn"
       href="https://discord.com/oauth2/authorize?client_id=1519585448152793109&permissions=8&integration_type=0&scope=bot"
       target="_blank">

        Discordに導入

    </a>

</section>

<section class="features">

    <h2>Features</h2>

    <div class="cards">

        <div class="card">
            <div class="emoji">📢</div>
            <h3>Easy Send</h3>
            <p>ブラウザから簡単にお知らせ送信</p>
        </div>

        <div class="card">
            <div class="emoji">🖼️</div>
            <h3>Image Upload</h3>
            <p>画像付きEmbedを送信可能</p>
        </div>

        <div class="card">
            <div class="emoji">🎨</div>
            <h3>Embed Color</h3>
            <p>好きな色でお知らせを装飾</p>
        </div>

        <div class="card">
            <div class="emoji">📱</div>
            <h3>Responsive</h3>
            <p>スマホ・PC両対応</p>
        </div>

    </div>

</section>

<footer>

    Created by KaN

</footer>

</body>
</html>
